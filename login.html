<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration | Avenir de Thiawlene</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.4)), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
        }
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: var(--radius);
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            .logo {
                font-size: 1rem;
            }
        }
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            font-family: inherit;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <img src="assets/images/logo.jpg" alt="Avenir de Thiawlene" class="logo-img" style="height: 60px;">
                AVENIR DE THIAWLENE
            </a>
            <h2 style="font-size: 1.5rem;">Espace Administration</h2>
            <p style="color: var(--text-muted);">Accès sécurisé pour le staff.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Saisissez votre pseudo" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">S'identifier</button>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                <a href="#" style="color: var(--text-muted);">Mot de passe oublié ?</a>
            </p>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
